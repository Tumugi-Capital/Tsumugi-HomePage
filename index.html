<head>
    <meta charset="UTF-8">

    <style>
        /* ベースフォントを標準の太さに設定 */
        body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
        
        /* 動く背景：上品なニュアンスカラーのグラデーション */
        .animated-bg {
            background: linear-gradient(-45deg, #020617, #0f172a, #111827, #1e293b);
            background-size: 400% 400%;
            animation: gradientAnimation 18s ease infinite;
            position: relative;
        }
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 背景に浮遊する光の粒子 */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .particle {
            position: absolute; display: block; list-style: none;
            background: rgba(255, 255, 255, 0.05); border-radius: 50%;
            animation: animateParticles linear infinite;
        }
        @keyframes animateParticles {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }
        .particle:nth-child(1) { left: 25%; width: 60px; height: 60px; animation-duration: 25s; }
        .particle:nth-child(2) { left: 10%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 15s; }
        .particle:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; animation-duration: 20s; }
